name: Close inactive issues

on:
  schedule:
    - cron: "30 1 * * *"

jobs:
  close-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: >-
            This issue is stale because it has had no activity for 60 days.
            Comment or remove the stale label to keep it open.
          close-issue-message: >-
            This issue was closed because it stayed inactive for 14 days after
            being marked stale.
          days-before-pr-stale: -1
          days-before-pr-close: -1
          repo-token: ${{ secrets.GITHUB_TOKEN }}
