name: Validate

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: none

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements-detect.txt

      - name: Install system and Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          pip install -r scripts/requirements-detect.txt

      - name: Compile registry
        run: ./scripts/kit compile

      - name: Validate kit (phase 1)
        run: ./scripts/kit validate --phase=1

      - name: Validate core skills pack
        run: ./scripts/kit validate-skills --pack=core

      - name: Validate patterns skills pack
        run: ./scripts/kit validate-skills --pack=patterns

      - name: Validate topics skills pack
        run: ./scripts/kit validate-skills --pack=topics

      - name: Validate stack pack manifests
        run: |
          ./scripts/kit validate-skills --pack=rails
          ./scripts/kit validate-skills --pack=node
          ./scripts/kit validate-skills --pack=python
          ./scripts/kit validate-skills --pack=go
          ./scripts/kit validate-skills --pack=elixir
          ./scripts/kit validate-skills --pack=devops
          ./scripts/kit validate-skills --pack=astro
          ./scripts/kit validate-skills --pack=tauri
          ./scripts/kit validate-skills --pack=swift
          ./scripts/kit validate-skills --pack=kotlin
          ./scripts/kit validate-skills --pack=react-native
          ./scripts/kit validate-skills --pack=flutter

      - name: Validate kit (full)
        run: ./scripts/kit validate
