---
id: rails
label: Ruby on Rails
language: ruby
framework: rails
tooling:
  test:
  - bundle exec rspec
  - bundle exec rails test
  lint:
  - bundle exec standardrb
  - bundle exec rubocop
  security:
  - bundle exec brakeman -q
  deps_audit:
  - bundle audit check
  optional:
  - bundle exec i18n-tasks health
  - npm run build
  - bin/vite build
skills:
  required:
  - stack-detection
  - testing-universal
  recommended:
  - rails-core-patterns
  if_spec_dir:
  - rails-testing-rspec
  if_test_dir:
  - rails-testing-minitest
  if_gem:
    importmap-rails:
    - rails-importmaps
    jsbundling-rails:
    - rails-js-bundling
    cssbundling-rails:
    - rails-js-bundling
    vite_rails:
    - rails-js-bundling
    shakapacker:
    - rails-js-bundling
    inertia_rails:
    - inertia
    turbo-rails:
    - hotwire
  if_file:
    config/application.rb:
      content_match: api_only
      skills:
      - rails-api
  if_package_dep:
    "@inertiajs/react":
    - react-patterns
    "@inertiajs/vue3":
    - vue-patterns
    "@inertiajs/svelte":
    - svelte-patterns
mcp_suggest:
- rails-mcp
dod_overlay:
- id: no_n_plus_one
  label: No N+1 queries — no unscoped iteration triggering per-row DB loads
- id: brakeman_clean
  label: Brakeman reports no new high-confidence warnings
- id: i18n_user_strings
  label: User-visible strings use i18n where the project uses i18n
